<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanz-Kompass</title>
    
    <!-- Adobe Fonts Integration -->
    <link rel="stylesheet" href="https://use.typekit.net/ptq2kts.css">
    
    <!-- Tailwind CSS für modernes Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel für die Ausführung im Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Zuweisung deiner Adobe Fonts */
        body {
            font-family: "stevie-sans", sans-serif;
            background-color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }
        
        h1, h2, h3, .total-black {
            font-family: "total-black", sans-serif;
            font-weight: 900;
        }

        .category-header {
            font-family: "total-black", sans-serif;
            letter-spacing: 0.15em;
            font-size: 0.75rem;
        }

        .display-label {
            font-family: "stevie-sans", sans-serif;
            letter-spacing: 0.3em;
        }

        .monitor-header-text {
            font-family: "total-black", sans-serif;
            letter-spacing: 0.5em;
        }

        .app-container {
            font-family: "stevie-sans", sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // --- FIREBASE KONFIGURATION ---
        // Dynamische Auswahl der Config: Nutzt System-Daten in der Vorschau und deine Daten auf GitHub.
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyB3Z3zLftB1DhVmuz4ThRBAND5JL_fA8BI",
                authDomain: "tanz-kompass.firebaseapp.com",
                projectId: "tanz-kompass",
                storageBucket: "tanz-kompass.firebasestorage.app",
                messagingSenderId: "433875226209",
                appId: "1:433875226209:web:626ae485666d70a14da420",
                measurementId: "G-R8GP3VCXSC"
            };
        }

        // Firebase Initialisierung
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "tanz-kompass-prod"; 

        const { useState, useEffect } = React;

        function TanzKompass() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('selection');
            const [activeDances, setActiveDances] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // Anmeldung mit Fehlerbehandlung und Custom-Token Unterstützung
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Anmeldefehler:", err);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Echtzeit-Datenabgleich (Regel 1: 6 Segmente im Pfad)
            useEffect(() => {
                if (!user) return;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'status', 'current');
                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setActiveDances(docSnap.data().activeDances || []);
                    }
                }, (err) => console.log("Verbindung wird aufgebaut..."));
                return () => unsubscribe();
            }, [user]);

            // Tanz-Auswahl umschalten
            const toggleDance = async (dance) => {
                if (!user) return;
                let newSelection = [...activeDances];
                const isSelected = newSelection.find(d => d.id === dance.id);
                
                if (dance.id === 'pause') {
                    newSelection = isSelected ? [] : [dance];
                } else {
                    newSelection = newSelection.filter(d => d.id !== 'pause');
                    if (isSelected) {
                        newSelection = newSelection.filter(d => d.id !== dance.id);
                    } else {
                        newSelection.push(dance);
                    }
                }
                
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'status', 'current');
                await setDoc(docRef, { activeDances: newSelection, updatedAt: Date.now() });
            };

            // Alles zurücksetzen
            const clearAll = async () => {
                if (!user) return;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'status', 'current');
                await setDoc(docRef, { activeDances: [], updatedAt: Date.now() });
            };

            const DANCE_STYLES = [
                { id: 'ccc', name: 'Cha Cha Cha', category: 'Latein', color: 'bg-rose-600' },
                { id: 'rumba', name: 'Rumba', category: 'Latein', color: 'bg-red-700' },
                { id: 'samba', name: 'Samba', category: 'Latein', color: 'bg-amber-500' },
                { id: 'jive', name: 'Jive', category: 'Latein', color: 'bg-orange-600' },
                { id: 'pasodoble', name: 'Paso Doble', category: 'Latein', color: 'bg-red-900' },
                { id: 'walzer', name: 'Langsamer Walzer', category: 'Standard', color: 'bg-blue-700' },
                { id: 'tango', name: 'Tango', category: 'Standard', color: 'bg-stone-900' },
                { id: 'wwalzer', name: 'Wiener Walzer', category: 'Standard', color: 'bg-cyan-600' },
                { id: 'quickstep', name: 'Quickstep', category: 'Standard', color: 'bg-emerald-600' },
                { id: 'slowfox', name: 'Slowfox', category: 'Standard', color: 'bg-teal-700' },
                { id: 'discofox', name: 'Discofox', category: 'Sonstige', color: 'bg-indigo-600' },
                { id: 'salsa', name: 'Salsa', category: 'Sonstige', color: 'bg-red-500' },
                { id: 'bachata', name: 'Bachata', category: 'Sonstige', color: 'bg-pink-700' },
            ];

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-900"></div>
                    </div>
                );
            }

            if (view === 'display') {
                return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center relative p-8 app-container overflow-hidden">
                        <div className="absolute top-10 text-center w-full z-20">
                            <h1 className="text-slate-100 text-2xl md:text-3xl font-black uppercase monitor-header-text">
                                Tanz-Kompass
                            </h1>
                        </div>

                        {activeDances.length > 0 ? (
                            <div className="text-center w-full max-w-7xl">
                                <h2 className="text-slate-400 text-2xl md:text-3xl font-light mb-12 uppercase display-label">
                                    {activeDances.some(d => d.id === 'pause') ? 'Status' : 'Aktueller Tanz'}
                                </h2>
                                <div className="flex flex-wrap justify-center items-center gap-8 md:gap-12 animate-in fade-in zoom-in duration-700">
                                    {activeDances.map((dance, idx) => (
                                        <React.Fragment key={dance.id}>
                                            <div className={`text-white text-5xl md:text-[7rem] lg:text-[10rem] font-bold py-10 px-16 md:py-16 md:px-24 rounded-[3.5rem] shadow-2xl ${dance.color} transition-all duration-1000 transform total-black`}>
                                                {dance.name}
                                            </div>
                                            {idx < activeDances.length - 1 && (
                                                <div className="text-slate-200 text-5xl md:text-[8rem] font-light">&</div>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="opacity-10 text-slate-900 text-6xl md:text-8xl font-black uppercase tracking-tighter text-center total-black">
                                Bereit für Musik
                            </div>
                        )}
                        
                        <button 
                            onClick={() => setView('selection')} 
                            className="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-2 text-slate-300 hover:text-slate-600 transition-colors text-[10px] uppercase tracking-widest bg-slate-50/50 hover:bg-slate-50 px-8 py-3 rounded-full border border-slate-100 shadow-sm"
                        >
                            <span>Zur Eingabe wechseln</span>
                        </button>
                    </div>
                );
            }

            return (
                <div className="p-4 md:p-6 max-w-7xl mx-auto app-container">
                    <header className="mb-8 flex flex-wrap justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-200 gap-4">
                        <h1 className="text-2xl font-black total-black text-slate-800 tracking-tight text-center">Tanz-Kompass</h1>
                        <div className="flex gap-4">
                            <button 
                                onClick={clearAll} 
                                className="bg-red-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-red-100 hover:bg-red-700 transition-all active:scale-95"
                            >
                                Neuer Tanz
                            </button>
                            <button 
                                onClick={() => setView('display')} 
                                className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold shadow-md hover:bg-slate-800 transition-all active:scale-95"
                            >
                                Monitor öffnen
                            </button>
                        </div>
                    </header>

                    <main className="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
                        {/* LATEIN SPALTE */}
                        <div className="space-y-4">
                            <h2 className="category-header text-slate-400 pl-2 uppercase">Latein</h2>
                            <div className="grid grid-cols-1 gap-3">
                                {DANCE_STYLES.filter(d => d.category === 'Latein').map(dance => {
                                    const isSelected = activeDances.find(ad => ad.id === dance.id);
                                    return (
                                        <button 
                                            key={dance.id} 
                                            onClick={() => toggleDance(dance)} 
                                            className={`p-5 rounded-2xl text-left border-2 w-full transition-all ${isSelected ? `${dance.color} text-white border-transparent scale-[1.02] shadow-md` : 'bg-white border-slate-100 hover:border-slate-300'}`}
                                        >
                                            <h3 className="font-bold text-lg">{dance.name}</h3>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* STANDARD SPALTE */}
                        <div className="space-y-4">
                            <h2 className="category-header text-slate-400 pl-2 uppercase">Standard</h2>
                            <div className="grid grid-cols-1 gap-3">
                                {DANCE_STYLES.filter(d => d.category === 'Standard').map(dance => {
                                    const isSelected = activeDances.find(ad => ad.id === dance.id);
                                    return (
                                        <button 
                                            key={dance.id} 
                                            onClick={() => toggleDance(dance)} 
                                            className={`p-5 rounded-2xl text-left border-2 w-full transition-all ${isSelected ? `${dance.color} text-white border-transparent scale-[1.02] shadow-md` : 'bg-white border-slate-100 hover:border-slate-300'}`}
                                        >
                                            <h3 className="font-bold text-lg">{dance.name}</h3>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* SONSTIGE SPALTE */}
                        <div className="space-y-4">
                            <h2 className="category-header text-slate-400 pl-2 uppercase">Sonstige</h2>
                            <div className="grid grid-cols-1 gap-3">
                                {DANCE_STYLES.filter(d => d.category === 'Sonstige').map(dance => {
                                    const isSelected = activeDances.find(ad => ad.id === dance.id);
                                    return (
                                        <button 
                                            key={dance.id} 
                                            onClick={() => toggleDance(dance)} 
                                            className={`p-5 rounded-2xl text-left border-2 w-full transition-all ${isSelected ? `${dance.color} text-white border-transparent scale-[1.02] shadow-md` : 'bg-white border-slate-100 hover:border-slate-300'}`}
                                        >
                                            <h3 className="font-bold text-lg">{dance.name}</h3>
                                        </button>
                                    );
                                })}
                                
                                {/* Pause Button */}
                                <button 
                                    onClick={() => toggleDance({ id: 'pause', name: 'Pause', category: 'Pause', color: 'bg-slate-500' })} 
                                    className={`p-5 rounded-2xl text-left border-2 w-full mt-6 transition-all ${activeDances.find(ad => ad.id === 'pause') ? 'bg-slate-500 text-white border-transparent shadow-md' : 'bg-white border-slate-100 hover:border-slate-300'}`}
                                >
                                    <div className="flex justify-between items-center">
                                        <h3 className="font-bold text-lg">Pause</h3>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </main>

                    <footer className="max-w-7xl mx-auto mt-16 text-center text-slate-400 text-[10px] uppercase tracking-[0.2em] border-t border-slate-200 pt-8">
                        Tanz-Kompass &copy; 2024 | Echtzeit-Anzeige aktiv
                    </footer>
                </div>
            );
        }

        // App Initialisierung
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TanzKompass />);
    </script>
</body>
</html>
