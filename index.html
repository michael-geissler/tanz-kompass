<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanz-Kompass</title>
    
    <!-- Adobe Fonts Integration -->
    <link rel="stylesheet" href="https://use.typekit.net/ptq2kts.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: "stevie-sans", sans-serif;
            background-color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, .total-black {
            font-family: "total-black", sans-serif;
            font-weight: 900;
        }
        .category-header {
            font-family: "total-black", sans-serif;
            letter-spacing: 0.15em;
            font-size: 0.75rem;
        }
        .monitor-header-text {
            font-family: "total-black", sans-serif;
            letter-spacing: 0.5em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DYNAMISCHE FIREBASE KONFIGURATION ---
        let firebaseConfig;
        
        // Prüfen, ob wir in der Canvas-Vorschau sind oder auf GitHub Pages
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            // Nutzung der System-Variablen in der Vorschau
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            // Deine persönlichen Daten für GitHub Pages
            firebaseConfig = {
                apiKey: "AIzaSyB3Z3zLftB1DhVmuz4ThRBAND5JL_fA8BI",
                authDomain: "tanz-kompass.firebaseapp.com",
                projectId: "tanz-kompass",
                storageBucket: "tanz-kompass.firebasestorage.app",
                messagingSenderId: "433875226209",
                appId: "1:433875226209:web:626ae485666d70a14da420",
                measurementId: "G-R8GP3VCXSC"
            };
        }

        // Initialisierung
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // App ID für den Speicherpfad
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tanz-kompass-prod';

        function TanzKompass() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('selection');
            const [activeDances, setActiveDances] = useState([]);
            const [status, setStatus] = useState('Verbinde...');

            useEffect(() => {
                // Anmeldung
                const initAuth = async () => {
                    try {
                        // Prüfen auf initialen Token in der Vorschau
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                        setStatus('Verbunden');
                    } catch (err) {
                        console.error("Auth Fehler:", err);
                        setStatus('Auth-Fehler: ' + err.code);
                    }
                };

                initAuth();
                const unsubscribeAuth = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // Pfad für die Synchronisation (6 Segmente für artifacts-Struktur)
                const docRef = db.doc(`artifacts/${appId}/public/data/status/current`);
                
                const unsubscribeSnap = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        setActiveDances(doc.data().activeDances || []);
                        setStatus('Verbunden (Synchronisiert)');
                    }
                }, err => {
                    console.error("DB Fehler:", err);
                    setStatus('DB-Fehler: ' + err.code);
                });
                
                return () => unsubscribeSnap();
            }, [user]);

            const updateTanz = async (newList) => {
                if (!user) return;
                const docRef = db.doc(`artifacts/${appId}/public/data/status/current`);
                try {
                    await docRef.set({
                        activeDances: newList,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        userId: user.uid
                    });
                } catch (err) {
                    console.error("Speicher Fehler:", err);
                    setStatus('Speicher-Fehler: ' + err.code);
                }
            };

            const toggleDance = (dance) => {
                let newSelection = [...activeDances];
                const isSelected = newSelection.some(d => d.id === dance.id);
                
                if (dance.id === 'pause') {
                    newSelection = isSelected ? [] : [dance];
                } else {
                    newSelection = newSelection.filter(d => d.id !== 'pause');
                    if (isSelected) {
                        newSelection = newSelection.filter(d => d.id !== dance.id);
                    } else {
                        newSelection.push(dance);
                    }
                }
                
                setActiveDances(newSelection); // Sofortige lokale Anzeige
                updateTanz(newSelection);      // Speichern in Cloud
            };

            const DANCE_STYLES = [
                { id: 'ccc', name: 'Cha Cha Cha', category: 'Latein', color: 'bg-rose-600' },
                { id: 'rumba', name: 'Rumba', category: 'Latein', color: 'bg-red-700' },
                { id: 'samba', name: 'Samba', category: 'Latein', color: 'bg-amber-500' },
                { id: 'jive', name: 'Jive', category: 'Latein', color: 'bg-orange-600' },
                { id: 'pasodoble', name: 'Paso Doble', category: 'Latein', color: 'bg-red-900' },
                { id: 'walzer', name: 'Langsamer Walzer', category: 'Standard', color: 'bg-blue-700' },
                { id: 'tango', name: 'Tango', category: 'Standard', color: 'bg-stone-900' },
                { id: 'wwalzer', name: 'Wiener Walzer', category: 'Standard', color: 'bg-cyan-600' },
                { id: 'quickstep', name: 'Quickstep', category: 'Standard', color: 'bg-emerald-600' },
                { id: 'slowfox', name: 'Slowfox', category: 'Standard', color: 'bg-teal-700' },
                { id: 'discofox', name: 'Discofox', category: 'Sonstige', color: 'bg-indigo-600' },
                { id: 'salsa', name: 'Salsa', category: 'Sonstige', color: 'bg-red-500' },
                { id: 'bachata', name: 'Bachata', category: 'Sonstige', color: 'bg-pink-700' },
            ];

            if (view === 'display') {
                return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center relative p-8 text-center app-container overflow-hidden">
                        <h1 className="absolute top-10 text-slate-100 text-3xl monitor-header-text uppercase">Tanz-Kompass</h1>
                        {activeDances.length > 0 ? (
                            <div className="animate-in fade-in zoom-in duration-500 w-full max-w-7xl">
                                <h2 className="text-slate-400 text-2xl uppercase mb-8 display-label">Aktueller Tanz</h2>
                                <div className="flex flex-wrap justify-center items-center gap-10">
                                    {activeDances.map(d => (
                                        <div key={d.id} className={`text-white text-6xl md:text-9xl font-bold py-12 px-20 rounded-[3rem] shadow-2xl ${d.color} total-black transition-all duration-500`}>
                                            {d.name}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="opacity-10 text-9xl font-black total-black uppercase">Bereit</div>
                        )}
                        <button onClick={() => setView('selection')} className="absolute bottom-6 px-6 py-2 border rounded-full text-slate-300 text-xs uppercase tracking-widest hover:text-slate-600 transition-colors">Setup</button>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-4xl mx-auto pb-20 app-container">
                    <header className="flex justify-between items-center mb-10 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <h1 className="text-2xl font-black total-black">Tanz-Kompass</h1>
                        <button onClick={() => setView('display')} className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-md">Monitor</button>
                    </header>
                    <div className="space-y-10">
                        {['Latein', 'Standard', 'Sonstige'].map(cat => (
                            <div key={cat} className="space-y-4">
                                <h2 className="category-header text-slate-400 uppercase ml-2">{cat}</h2>
                                <div className="grid grid-cols-1 gap-3">
                                    {DANCE_STYLES.filter(d => d.category === cat).map(dance => {
                                        const active = activeDances.some(ad => ad.id === dance.id);
                                        return (
                                            <button 
                                                key={dance.id} 
                                                onClick={() => toggleDance(dance)}
                                                className={`p-6 rounded-[2rem] text-left border-4 transition-all duration-200 ${active ? `${dance.color} border-white text-white shadow-xl scale-[1.02] ring-4 ring-offset-2 ring-slate-100` : 'bg-white border-slate-50 text-slate-700 hover:border-slate-200 shadow-sm'}`}
                                            >
                                                <span className="text-xl font-bold">{dance.name}</span>
                                            </button>
                                        );
                                    })}
                                    {cat === 'Sonstige' && (
                                        <button 
                                            onClick={() => toggleDance({ id: 'pause', name: 'Pause', category: 'Pause', color: 'bg-slate-500' })} 
                                            className={`p-6 rounded-[2rem] text-left border-4 transition-all duration-200 mt-4 ${activeDances.some(ad => ad.id === 'pause') ? 'bg-slate-500 border-white text-white shadow-xl scale-[1.02] ring-4 ring-offset-2 ring-slate-100' : 'bg-white border-slate-50 text-slate-700 hover:border-slate-200 shadow-sm'}`}
                                        >
                                            <div className="flex justify-between items-center font-bold text-xl">
                                                <span>Pause</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
                                            </div>
                                        </button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-sm p-2 text-[10px] text-center border-t border-slate-200 z-50">
                        Status: <span className={status.includes('Fehler') ? 'text-red-500 font-bold' : 'text-emerald-600'}>{status}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TanzKompass />);
    </script>
</body>
</html>
